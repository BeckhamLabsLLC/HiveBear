# Cross-compilation configuration for HiveBear

# WASM: enable getrandom JS backend (required by candle -> rand -> getrandom 0.3)
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]

# Raspberry Pi 5 and other ARM64 Linux devices
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# ARM64 musl (static linking for portable binaries)
[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-gnu-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

# Android targets (NDK toolchain)
# Requires ANDROID_HOME and NDK 27+ installed
[target.aarch64-linux-android]
linker = "aarch64-linux-android35-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi35-clang"

[target.i686-linux-android]
linker = "i686-linux-android35-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android35-clang"

# Ensure NDK toolchain is on PATH for Android builds.
# Add to your shell: export PATH="$ANDROID_HOME/ndk/<version>/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
