name: Mobile Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.1.12297006"

      - name: Install frontend dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Install tauri-cli
        run: cargo install tauri-cli

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
          CC_aarch64_linux_android: aarch64-linux-android35-clang
          CC_armv7_linux_androideabi: armv7a-linux-androideabi35-clang
          CC_x86_64_linux_android: x86_64-linux-android35-clang
          AR_aarch64_linux_android: llvm-ar
          AR_armv7_linux_androideabi: llvm-ar
          AR_x86_64_linux_android: llvm-ar
        run: |
          export PATH="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          cd apps/desktop
          cargo tauri android build -- --no-default-features --features mobile

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            apps/desktop/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  upload-android-assets:
    name: Upload Android Assets to Release
    permissions:
      contents: write
    needs: [build-android]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !cancelled() && needs.build-android.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts

      - name: Collect APK assets
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p release
          find artifacts -name "*.apk" -exec cp {} release/ \;
          cd release
          # Create stable-named copy for website download
          for f in *universal*.apk; do [ -f "$f" ] && cp "$f" HiveBear.apk; done
          sha256sum * > SHA256SUMS-android.txt

      - name: Upload Android assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG_NAME" release/* --repo "$REPO" --clobber
