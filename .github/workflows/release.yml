name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: hivebear
            use_cross: false
            features: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: hivebear
            use_cross: true
            features: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: hivebear
            use_cross: false
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: hivebear
            use_cross: false
            features: "llamacpp-metal"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hivebear.exe
            use_cross: false
            features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (aarch64-linux)
        if: matrix.use_cross
        run: cargo install cross@0.2.5 --locked

      - name: Add target
        if: "!matrix.use_cross"
        run: rustup target add ${{ matrix.target }}

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release -p hivebear-cli --target ${{ matrix.target }}

      - name: Build with cargo (default features)
        if: "!matrix.use_cross && matrix.features == ''"
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: cargo build --release -p hivebear-cli --target ${{ matrix.target }}

      - name: Build with cargo (extra features)
        if: "!matrix.use_cross && matrix.features != ''"
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: cargo build --release -p hivebear-cli --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../hivebear-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "hivebear-${{ matrix.target }}.zip"

      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.target }}
          path: hivebear-${{ matrix.target }}.tar.gz

      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.target }}
          path: hivebear-${{ matrix.target }}.zip

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            tauri_features: ""
          - os: macos-latest
            platform: macos
            tauri_features: "llamacpp-metal"
          - os: windows-latest
            platform: windows
            tauri_features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-desktop-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-desktop-cargo-

      - name: Install Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Install tauri-cli
        run: cargo install tauri-cli@2.5.0 --locked

      - name: Build Tauri app (default features)
        if: matrix.tauri_features == ''
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd apps/desktop
          cargo tauri build

      - name: Build Tauri app (extra features)
        if: matrix.tauri_features != ''
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd apps/desktop
          cargo tauri build -- --features ${{ matrix.tauri_features }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.tar.gz
            target/release/bundle/appimage/*.AppImage.tar.gz.sig

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-macos
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Windows MSI artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-msi
          path: target/release/bundle/msi/*.msi

      - name: Upload Windows NSIS artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-nsis
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.nsis.zip
            target/release/bundle/nsis/*.nsis.zip.sig

  verify-cargo-install:
    name: Verify cargo install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-install-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-install-

      - name: cargo install from path
        run: cargo install --path crates/hivebear-cli

      - name: Verify binary
        run: hivebear --version

  build-docker:
    name: Build Docker (${{ matrix.variant }})
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            tag_suffix: ""
          - variant: cuda
            dockerfile: Dockerfile.cuda
            tag_suffix: "-cuda"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/beckhamlabsllc/hivebear:${{ github.ref_name }}${{ matrix.tag_suffix }}
            ghcr.io/beckhamlabsllc/hivebear:latest${{ matrix.tag_suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    permissions:
      contents: write
    needs: [build-cli, verify-cargo-install]
    if: ${{ !cancelled() && needs.verify-cargo-install.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cli-*
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/cli-* -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            release/*

  sign-windows:
    name: Sign Windows Installers (SignPath)
    needs: [build-desktop]
    if: ${{ !cancelled() && needs.build-desktop.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows MSI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-windows-msi
          path: unsigned/msi

      - name: Download Windows NSIS artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-windows-nsis
          path: unsigned/nsis

      - name: Submit to SignPath
        if: vars.SIGNPATH_ORG_ID != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: hivebear
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-installers
          input-artifact-path: unsigned/
          output-artifact-path: signed/
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 600

      - name: Upload signed MSI
        if: vars.SIGNPATH_ORG_ID != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-msi-signed
          path: signed/msi/

      - name: Upload signed NSIS
        if: vars.SIGNPATH_ORG_ID != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-nsis-signed
          path: signed/nsis/

  upload-desktop-assets:
    name: Upload Desktop Assets to Release
    permissions:
      contents: write
    needs: [create-release, build-desktop, sign-windows]
    if: ${{ !cancelled() && needs.create-release.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # Try signed Windows artifacts first, fall back to unsigned
      - name: Download signed Windows MSI
        id: signed-msi
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-windows-msi-signed
          path: artifacts/desktop-windows-msi

      - name: Download signed Windows NSIS
        id: signed-nsis
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-windows-nsis-signed
          path: artifacts/desktop-windows-nsis

      - name: Download unsigned Windows MSI (fallback)
        if: steps.signed-msi.outcome != 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-windows-msi
          path: artifacts/desktop-windows-msi

      - name: Download unsigned Windows NSIS (fallback)
        if: steps.signed-nsis.outcome != 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-windows-nsis
          path: artifacts/desktop-windows-nsis

      - name: Download Linux desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-linux
          path: artifacts/desktop-linux

      - name: Download macOS desktop artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: desktop-macos
          path: artifacts/desktop-macos

      - name: Collect and rename desktop assets
        run: |
          mkdir -p release
          # Collect all desktop artifacts (installers + updater bundles + signatures)
          find artifacts/desktop-* -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.tar.gz" -o -name "*.nsis.zip" -o -name "*.sig" \) -exec cp {} release/ \;

          # Create stable-named copies for website download buttons
          cd release
          for f in *.dmg; do [ -f "$f" ] && cp "$f" HiveBear.dmg; done
          for f in *_x64_en-US.msi; do [ -f "$f" ] && cp "$f" HiveBear-x64.msi; done
          for f in *x64-setup.exe; do [ -f "$f" ] && cp "$f" HiveBear-x64-setup.exe; done
          for f in *_amd64.AppImage; do [ -f "$f" ] && cp "$f" HiveBear-x86_64.AppImage; done
          for f in *_amd64.deb; do [ -f "$f" ] && cp "$f" HiveBear-x86_64.deb; done

          # Generate checksums for desktop assets
          sha256sum * > SHA256SUMS-desktop.txt

      - name: Generate updater manifest (latest.json)
        env:
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures (if they exist)
          LINUX_SIG=""
          MACOS_SIG=""
          WINDOWS_SIG=""

          for f in release/*.AppImage.tar.gz.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f")
          done
          for f in release/*.app.tar.gz.sig; do
            [ -f "$f" ] && MACOS_SIG=$(cat "$f")
          done
          for f in release/*.nsis.zip.sig; do
            [ -f "$f" ] && WINDOWS_SIG=$(cat "$f")
          done

          # Find update bundle filenames
          LINUX_FILE=""
          MACOS_FILE=""
          WINDOWS_FILE=""

          for f in release/*.AppImage.tar.gz; do
            [ -f "$f" ] && LINUX_FILE=$(basename "$f")
          done
          for f in release/*.app.tar.gz; do
            [ -f "$f" ] && MACOS_FILE=$(basename "$f")
          done
          for f in release/*.nsis.zip; do
            [ -f "$f" ] && WINDOWS_FILE=$(basename "$f")
          done

          # Build latest.json
          python3 -c "
          import json, sys
          platforms = {}
          if '$LINUX_SIG' and '$LINUX_FILE':
              platforms['linux-x86_64'] = {
                  'signature': '$LINUX_SIG',
                  'url': '${BASE_URL}/${LINUX_FILE}'
              }
          if '$MACOS_SIG' and '$MACOS_FILE':
              platforms['darwin-x86_64'] = {
                  'signature': '$MACOS_SIG',
                  'url': '${BASE_URL}/${MACOS_FILE}'
              }
              platforms['darwin-aarch64'] = {
                  'signature': '$MACOS_SIG',
                  'url': '${BASE_URL}/${MACOS_FILE}'
              }
          if '$WINDOWS_SIG' and '$WINDOWS_FILE':
              platforms['windows-x86_64'] = {
                  'signature': '$WINDOWS_SIG',
                  'url': '${BASE_URL}/${WINDOWS_FILE}'
              }
          manifest = {
              'version': '${VERSION}',
              'pub_date': '${PUB_DATE}',
              'platforms': platforms
          }
          json.dump(manifest, open('release/latest.json', 'w'), indent=2)
          print(json.dumps(manifest, indent=2))
          "

      - name: Upload desktop assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG_NAME" release/* --repo "$REPO" --clobber
