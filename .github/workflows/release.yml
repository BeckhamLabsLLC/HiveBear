name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: hivebear
            use_cross: false
            features: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: hivebear
            use_cross: true
            features: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: hivebear
            use_cross: false
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: hivebear
            use_cross: false
            features: "llamacpp-metal"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hivebear.exe
            use_cross: false
            features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross (aarch64-linux)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Add target
        if: "!matrix.use_cross"
        run: rustup target add ${{ matrix.target }}

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release -p hivebear-cli --target ${{ matrix.target }}

      - name: Build with cargo (default features)
        if: "!matrix.use_cross && matrix.features == ''"
        run: cargo build --release -p hivebear-cli --target ${{ matrix.target }}

      - name: Build with cargo (extra features)
        if: "!matrix.use_cross && matrix.features != ''"
        run: cargo build --release -p hivebear-cli --target ${{ matrix.target }} --features ${{ matrix.features }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../hivebear-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "hivebear-${{ matrix.target }}.zip"

      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: hivebear-${{ matrix.target }}.tar.gz

      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: hivebear-${{ matrix.target }}.zip

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            tauri_features: ""
          - os: macos-latest
            platform: macos
            tauri_features: "llamacpp-metal"
          - os: windows-latest
            platform: windows
            tauri_features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-desktop-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-desktop-cargo-

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          cd apps/desktop
          npm install

      - name: Install tauri-cli
        run: cargo install tauri-cli

      - name: Build Tauri app (default features)
        if: matrix.tauri_features == ''
        run: |
          cd apps/desktop
          cargo tauri build

      - name: Build Tauri app (extra features)
        if: matrix.tauri_features != ''
        run: |
          cd apps/desktop
          cargo tauri build -- --features ${{ matrix.tauri_features }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows MSI artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows NSIS artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-nsis
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe

  verify-cargo-install:
    name: Verify cargo install
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ubuntu-cargo-install-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-install-

      - name: cargo install from path
        run: cargo install --path crates/hivebear-cli

      - name: Verify binary
        run: hivebear --version

  build-docker:
    name: Build Docker (${{ matrix.variant }})
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            dockerfile: Dockerfile
            tag_suffix: ""
          - variant: cuda
            dockerfile: Dockerfile.cuda
            tag_suffix: "-cuda"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/beckhamlabsllc/hivebear:${{ github.ref_name }}${{ matrix.tag_suffix }}
            ghcr.io/beckhamlabsllc/hivebear:latest${{ matrix.tag_suffix }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    permissions:
      contents: write
    needs: [build-cli, verify-cargo-install]
    if: ${{ !cancelled() && needs.verify-cargo-install.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts/cli-* -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            release/*

  upload-desktop-assets:
    name: Upload Desktop Assets to Release
    permissions:
      contents: write
    needs: [create-release, build-desktop]
    if: ${{ !cancelled() && needs.create-release.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: artifacts

      - name: Collect and rename desktop assets
        run: |
          mkdir -p release
          # Collect all desktop artifacts
          find artifacts/desktop-* -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \) -exec cp {} release/ \;

          # Create stable-named copies for website download buttons
          cd release
          for f in *.dmg; do [ -f "$f" ] && cp "$f" HiveBear.dmg; done
          for f in *_x64_en-US.msi; do [ -f "$f" ] && cp "$f" HiveBear-x64.msi; done
          for f in *x64-setup.exe; do [ -f "$f" ] && cp "$f" HiveBear-x64-setup.exe; done
          for f in *_amd64.AppImage; do [ -f "$f" ] && cp "$f" HiveBear-x86_64.AppImage; done
          for f in *_amd64.deb; do [ -f "$f" ] && cp "$f" HiveBear-x86_64.deb; done

          # Generate checksums for desktop assets
          sha256sum * > SHA256SUMS-desktop.txt

      - name: Upload desktop assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG_NAME" release/* --repo "$REPO" --clobber
