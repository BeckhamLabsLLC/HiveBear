# Configuration for the `cross` tool (https://github.com/cross-rs/cross)
# Used for cross-compiling to ARM targets (Raspberry Pi 5, etc.)

[target.aarch64-unknown-linux-gnu]
# Use the default cross image for aarch64
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
# Install OpenSSL dev headers for cross-compilation
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y libssl-dev:$CROSS_DEB_ARCH"
]

[target.aarch64-unknown-linux-gnu.env]
# Optimize for Cortex-A76 (Raspberry Pi 5)
passthrough = ["CFLAGS=-march=armv8.2-a+dotprod"]
