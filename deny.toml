# cargo-deny configuration for HiveBear
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Reviewed 2026-03-31. Transitive deps we can't control (gtk-rs GTK3 from Tauri, bincode, fxhash).
# Next review: 2026-06-30.
ignore = [
    "RUSTSEC-2024-0370",  # bincode: crafted input DoS. Not reachable via our API surface.
    "RUSTSEC-2024-0411",  # gtk-rs: unmaintained GTK3 binding (Tauri transitive dep).
    "RUSTSEC-2024-0412",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0413",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0414",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0415",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0416",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0417",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0418",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0419",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0420",  # gtk-rs: unmaintained (Tauri transitive dep).
    "RUSTSEC-2024-0436",  # fxhash: unmaintained. Transitive dep, no direct usage.
    "RUSTSEC-2025-0057",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0075",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0080",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0081",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0098",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0100",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0119",  # Transitive dep. No patch available.
    "RUSTSEC-2025-0141",  # Transitive dep. No patch available.
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
